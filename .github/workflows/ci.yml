# Minimális CI: lint, unit tesztek, integration tesztek
name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Upgrade packaging tools
        run: python -m pip install --upgrade pip setuptools wheel
      - name: Install ruff
        run: python -m pip install ruff
      - name: Lint
        run: ruff check . --output-format=concise
        continue-on-error: true

  unit:
    runs-on: ubuntu-latest
    env:
      QDRANT_URL: "http://localhost:6333"
      QDRANT_API_KEY: ""
      OPENAI_API_KEY: "test-openai-api-key"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Upgrade packaging tools
        run: python -m pip install --upgrade pip setuptools wheel
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Re-upgrade packaging tools
        run: python -m pip install --upgrade pip setuptools wheel
      - name: Install package (editable)
        run: python -m pip install -e .
      - name: Unit tests
        run: pytest tests/unit -v --tb=short

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: aiplaza
          POSTGRES_USER: postgres
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d aiplaza"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      QDRANT_URL: "http://localhost:6333"
      QDRANT_API_KEY: ""
      OPENAI_API_KEY: "test-openai-api-key"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Upgrade packaging tools
        run: python -m pip install --upgrade pip setuptools wheel
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Re-upgrade packaging tools
        run: python -m pip install --upgrade pip setuptools wheel
      - name: Install package (editable)
        run: python -m pip install -e .
      - name: Initialize test database
        run: DATABASE_URL="postgresql+psycopg2://postgres:postgres@127.0.0.1:5432/aiplaza" database_url="postgresql+psycopg2://postgres:postgres@127.0.0.1:5432/aiplaza" python scripts/init_db.py
      - name: Seed demo owner
        run: DATABASE_URL="postgresql+psycopg2://postgres:postgres@127.0.0.1:5432/aiplaza" database_url="postgresql+psycopg2://postgres:postgres@127.0.0.1:5432/aiplaza" ADMIN_EMAIL="admin@example.com" ADMIN_PASSWORD="admin123" python scripts/seed_user.py
      - name: Integration tests
        run: DATABASE_URL="postgresql+psycopg2://postgres:postgres@127.0.0.1:5432/aiplaza" database_url="postgresql+psycopg2://postgres:postgres@127.0.0.1:5432/aiplaza" pytest tests/integration -v --tb=short
        env:
          DISABLE_CSRF: "1"
          RATE_LIMIT_LOGIN_PER_MINUTE: "100"
