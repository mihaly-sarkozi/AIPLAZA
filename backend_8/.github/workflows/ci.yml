name: backend-ci

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      APP_ENV: "test"
      JWT_SECRET: "test-secret-with-enough-length-0123456789012345678901234567890123456789"
      JWT_ISSUER: "test"
      JWT_AUDIENCE: "test"
      DISABLE_CSRF: "1"
      RATE_LIMIT_LOGIN_PER_MINUTE: "100"
      QDRANT_URL: "http://localhost:6333"
      QDRANT_API_KEY: "test-qdrant-key"
      OPENAI_API_KEY: "test-openai-api-key"
      DATABASE_URL: "sqlite+pysqlite:///:memory:"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements-dev.txt
          python -m pip install -e ".[test]"

      - name: Compile check
        working-directory: backend
        run: python -m compileall .

      - name: Lint
        working-directory: backend
        run: ruff check . --output-format=concise

      - name: Unit tests
        working-directory: backend
        run: pytest tests/unit -v --tb=short

      - name: No runtime DDL check
        run: python scripts/check_no_runtime_ddl.py

      - name: Import boundary check
        run: python scripts/check_import_boundaries.py

      - name: Package clean check
        run: |
          bash scripts/package_backend.sh /tmp/backend_clean.zip
          unzip -l /tmp/backend_clean.zip > /tmp/backend_clean_zip_listing.txt
          ! grep -E '(__MACOSX|\.DS_Store|/\._|__pycache__|\.pyc|\.pyo|\.git/|\.venv/|node_modules/)' /tmp/backend_clean_zip_listing.txt

      - name: Typecheck
        working-directory: backend
        run: mypy
